<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" fill="none">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .title { font-size: 13px; font-weight: 600; fill: #e5e7eb; letter-spacing: 0.05em; }
      .label { font-size: 11px; font-weight: 500; fill: #d1d5db; }
      .sublabel { font-size: 9.5px; fill: #9ca3af; }
      .spec { font-size: 9px; fill: #6b7280; font-family: 'SF Mono', 'Fira Code', monospace; }
      .arrow { stroke: #4b5563; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5563"/>
    </marker>
  </defs>

  <rect width="1100" height="400" rx="12" fill="#0d1117"/>
  <rect width="1100" height="400" rx="12" fill="none" stroke="#21262d"/>

  <text x="550" y="36" text-anchor="middle" class="title" fill="#f59e0b" style="font-size:15px; letter-spacing:0.15em;">CONTENT MASTERING PIPELINE</text>
  <text x="550" y="52" text-anchor="middle" class="spec">Ingest  →  Analyze  →  Upscale  →  Grade  →  Spatialize  →  Certify  →  Distribute</text>

  <!-- Pipeline stages -->
  <rect x="15" y="80" width="130" height="100" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="80" y="102" text-anchor="middle" class="title">INGEST</text>
  <line x1="35" y1="112" x2="125" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="80" y="130" text-anchor="middle" class="sublabel">Format validation</text>
  <text x="80" y="148" text-anchor="middle" class="sublabel">Metadata extract</text>
  <text x="80" y="170" text-anchor="middle" class="spec">pipeline/ingest</text>

  <path d="M 145 130 L 165 130" class="arrow"/>

  <rect x="165" y="80" width="130" height="100" rx="8" fill="#161b22" stroke="#f59e0b"/>
  <text x="230" y="102" text-anchor="middle" class="title" fill="#f59e0b">UPSCALE</text>
  <line x1="185" y1="112" x2="275" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="230" y="130" text-anchor="middle" class="sublabel">AI neural upscaling</text>
  <text x="230" y="148" text-anchor="middle" class="sublabel">Target: 8K / 16K</text>
  <text x="230" y="170" text-anchor="middle" class="spec">pipeline/video</text>

  <path d="M 295 130 L 315 130" class="arrow"/>

  <rect x="315" y="80" width="130" height="100" rx="8" fill="#161b22" stroke="#f59e0b"/>
  <text x="380" y="102" text-anchor="middle" class="title" fill="#f59e0b">HDR GRADE</text>
  <line x1="335" y1="112" x2="425" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="380" y="130" text-anchor="middle" class="sublabel">PQ tone mapping</text>
  <text x="380" y="148" text-anchor="middle" class="sublabel">12,000 nit target</text>
  <text x="380" y="170" text-anchor="middle" class="spec">pipeline/video</text>

  <path d="M 445 130 L 465 130" class="arrow"/>

  <rect x="465" y="80" width="130" height="100" rx="8" fill="#161b22" stroke="#06b6d4"/>
  <text x="530" y="102" text-anchor="middle" class="title" fill="#06b6d4">SPATIALIZE</text>
  <line x1="485" y1="112" x2="575" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="530" y="130" text-anchor="middle" class="sublabel">Atmos to WFS</text>
  <text x="530" y="148" text-anchor="middle" class="sublabel">2,048+ channels</text>
  <text x="530" y="170" text-anchor="middle" class="spec">pipeline/audio</text>

  <path d="M 595 130 L 615 130" class="arrow"/>

  <rect x="615" y="80" width="130" height="100" rx="8" fill="#161b22" stroke="#a855f7"/>
  <text x="680" y="102" text-anchor="middle" class="title" fill="#a855f7">METADATA</text>
  <line x1="635" y1="112" x2="725" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="680" y="130" text-anchor="middle" class="sublabel">SENTIO scene tags</text>
  <text x="680" y="148" text-anchor="middle" class="sublabel">Emotion mapping</text>
  <text x="680" y="170" text-anchor="middle" class="spec">pipeline/ai</text>

  <path d="M 745 130 L 765 130" class="arrow"/>

  <rect x="765" y="80" width="130" height="100" rx="8" fill="#161b22" stroke="#22c55e"/>
  <text x="830" y="102" text-anchor="middle" class="title" fill="#22c55e">CERTIFY</text>
  <line x1="785" y1="112" x2="875" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="830" y="130" text-anchor="middle" class="sublabel">Tier validation</text>
  <text x="830" y="148" text-anchor="middle" class="sublabel">Quality scoring</text>
  <text x="830" y="170" text-anchor="middle" class="spec">pipeline/certification</text>

  <path d="M 895 130 L 915 130" class="arrow"/>

  <rect x="915" y="80" width="130" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="980" y="102" text-anchor="middle" class="title">DISTRIBUTE</text>
  <line x1="935" y1="112" x2="1025" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="980" y="130" text-anchor="middle" class="sublabel">CDN packaging</text>
  <text x="980" y="148" text-anchor="middle" class="sublabel">Multi-tier output</text>
  <text x="980" y="170" text-anchor="middle" class="spec">pipeline/distribution</text>

  <!-- Output format cards -->
  <text x="550" y="220" text-anchor="middle" class="title">OUTPUT FORMATS</text>

  <rect x="50" y="240" width="230" height="55" rx="6" fill="#161b22" stroke="#fcd34d"/>
  <text x="165" y="260" text-anchor="middle" class="label" fill="#fcd34d">SANCTUM</text>
  <text x="165" y="280" text-anchor="middle" class="sublabel">16K · PQ 15,000 nits · 512 ch</text>

  <rect x="300" y="240" width="230" height="55" rx="6" fill="#161b22" stroke="#f59e0b"/>
  <text x="415" y="260" text-anchor="middle" class="label" fill="#f59e0b">VISIONNAIRE</text>
  <text x="415" y="280" text-anchor="middle" class="sublabel">16K · PQ 12,000 nits · 2,048 ch</text>

  <rect x="550" y="240" width="230" height="55" rx="6" fill="#161b22" stroke="#ea580c"/>
  <text x="665" y="260" text-anchor="middle" class="label" fill="#ea580c">ETOILEE</text>
  <text x="665" y="280" text-anchor="middle" class="sublabel">8K · PQ 6,000 nits · 256 ch</text>

  <rect x="800" y="240" width="230" height="55" rx="6" fill="#161b22" stroke="#78716c"/>
  <text x="915" y="260" text-anchor="middle" class="label">ATELIER</text>
  <text x="915" y="280" text-anchor="middle" class="sublabel">Variable · Sentio Suite</text>

  <!-- Legend -->
  <rect x="30" y="330" width="1040" height="50" rx="6" fill="#0d1117" stroke="#21262d"/>
  <rect x="60" y="348" width="12" height="12" rx="2" fill="none" stroke="#f59e0b"/>
  <text x="80" y="360" class="spec">Video processing</text>
  <rect x="180" y="348" width="12" height="12" rx="2" fill="none" stroke="#06b6d4"/>
  <text x="200" y="360" class="spec">Audio spatialization</text>
  <rect x="320" y="348" width="12" height="12" rx="2" fill="none" stroke="#a855f7"/>
  <text x="340" y="360" class="spec">AI metadata generation</text>
  <rect x="480" y="348" width="12" height="12" rx="2" fill="none" stroke="#22c55e"/>
  <text x="500" y="360" class="spec">Certification</text>
  <text x="700" y="360" class="spec">sylvain-pipeline master input.mov --tier visionnaire</text>
</svg>
